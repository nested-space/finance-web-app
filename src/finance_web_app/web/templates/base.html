<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Personal Finances{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ url_for('home.index') }}">Personal Finances</a>
      <nav>
        <a href="{{ url_for('summary.dashboard') }}">Dashboard</a>
        <a href="{{ url_for('budgets.list_budgets') }}">Budgets</a>
        <a href="{{ url_for('expenses.list_expenses') }}">Expenses</a>
        <a href="{{ url_for('commitments.list_commitments') }}">Commitments</a>
        <a href="{{ url_for('income.list_income') }}">Income</a>
        <a href="{{ url_for('categories.list_categories') }}">Categories</a>
      </nav>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/modal.js') }}"></script>
  </body>
</html>
